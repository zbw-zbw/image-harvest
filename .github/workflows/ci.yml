# CI for Image Harvest
#
# Five jobs run on every push/PR. Each one is small enough that splitting
# them gives faster feedback than a single mega-job:
#   - lint:       eslint over the whole tree (fast, no compile)
#   - typecheck:  tsc --noEmit (catches the most regressions, run alone so
#                 the log is easy to read)
#   - test:       vitest unit suite + coverage
#   - build:      vite build, plus uploads dist/ as an artifact so reviewers
#                 can sideload the unpacked extension into Chrome.
#   - e2e:        Playwright smoke tests against a real Chromium with the
#                 unpacked extension loaded. Depends on `build` because the
#                 extension is loaded from dist/. Headed Chromium is run
#                 under xvfb-run because MV3 service workers don't init in
#                 headless-shell.
#
# `npm ci --legacy-peer-deps` mirrors what we do locally — @crxjs/vite-plugin
# (beta) declares a peer dep range Vite 5 doesn't satisfy, but the runtime
# combination is fine in practice.
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel obsolete runs when new commits land on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm test
      # Coverage is best-effort: don't fail the run if the optional reporter
      # has trouble installing on a fresh CI box (it pulls in v8-coverage
      # native bits that occasionally flake on first install).
      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # ANALYZE=1 emits dist/stats.html (treemap) + dist/stats.txt (per-source
      # rendered byte breakdown). Only adds ~150 ms to the build but gives
      # reviewers a permanent record of what's in each chunk per commit.
      - name: Build (with bundle analyzer)
        run: ANALYZE=1 npm run build
      # Print the chunk size summary right in the CI log so size regressions
      # are visible without downloading the artifact.
      - name: Print chunk sizes
        run: |
          echo '### Chunk sizes' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/assets/*.js | awk '{ printf "%-10s %s\n", $5, $9 }' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      # Enforce a hard size budget on the sidepanel main chunk. Failing the
      # build forces the offending PR to either justify the regression or
      # bump the budget intentionally — see scripts/check-bundle-size.mjs.
      - name: Check bundle size budget
        run: node scripts/check-bundle-size.mjs
      # The artifact lets reviewers download dist/ and sideload the extension
      # without checking out the branch locally — useful for design-review PRs.
      - name: Upload extension build
        uses: actions/upload-artifact@v4
        with:
          name: image-harvest-dist-${{ github.sha }}
          path: dist/
          retention-days: 14
      # Bundle analyzer reports — separate artifact so reviewers can grab
      # just the treemap without re-downloading the whole dist/.
      - name: Upload bundle analyzer report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-${{ github.sha }}
          path: |
            dist/stats.html
            dist/stats.txt
          if-no-files-found: warn
          retention-days: 30

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      # Re-run the build inside this job so dist/ is local. Cheaper than
      # downloading the artifact from the build job and unpacking it.
      - run: npm run build
      # `playwright install --with-deps` pulls Chromium + the system libs
      # (libnss3, libatk, etc) needed for headed mode. xvfb is not part of
      # --with-deps, so we install it explicitly.
      - name: Install Playwright + xvfb
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y xvfb
      # MV3 service workers won't initialize in headless-shell — wrap the
      # whole run in xvfb-run so headed Chromium gets a virtual display.
      - name: Run Playwright smoke tests
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
