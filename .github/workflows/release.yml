# Release workflow for Image Harvest
#
# Triggered by pushing a `v*` tag (e.g. `git push origin v1.0.2`). Verifies
# the tag matches `package.json`'s version, runs the same gates as ci.yml
# (lint/typecheck/test/build), zips the production `dist/` folder, and
# publishes a GitHub Release with the zip attached.
#
# Typical flow on a maintainer machine:
#   npm run release:patch   # bumps package.json → commits → tags → pushes
#
# `npm version` already creates an annotated tag and the matching commit;
# this workflow does the rest.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Allow only one release run per tag — concurrent triggers for the same tag
# would race when uploading release assets.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  # `softprops/action-gh-release` needs write access to create the Release
  # entry and attach assets.
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history lets `softprops/action-gh-release` auto-generate
          # release notes from the commits since the previous tag.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Sanity check: refuse to publish if the tag (e.g. v1.2.3) doesn't match
      # the version in package.json — otherwise the manifest baked into the
      # extension zip would silently disagree with the GitHub Release name.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Produce two artifacts for downstream consumers:
      #   1. image-harvest-vX.Y.Z.zip  → upload-to-Chrome-Web-Store-ready
      #      The Web Store rejects archives whose top-level entry is a
      #      directory, so we zip the *contents* of dist/ from inside it.
      #   2. The same zip becomes the GitHub Release asset.
      - name: Package extension zip
        id: package
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ZIP_NAME="image-harvest-v${VERSION}.zip"
          (cd dist && zip -r "../${ZIP_NAME}" .)
          ls -lh "${ZIP_NAME}"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Auto-generate release notes from commits between this tag and the
          # previous one. Maintainers can still edit afterwards.
          generate_release_notes: true
          # Mark `-alpha` / `-beta` / `-rc` tags as prereleases automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.package.outputs.zip_name }}
          fail_on_unmatched_files: true
