<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reverse Image Search - Image Harvest</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #d93025;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="loading" id="status">
    <div class="spinner"></div>
    <p>Preparing reverse image search...</p>
  </div>

  <script type="module" src="reverse-search.ts"></script>
</body>
</html>
