<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Image Harvest e2e fixture</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        background: #fafafa;
      }
      h1 {
        font-size: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 16px;
      }
      .grid > * {
        background: #fff;
        border: 1px solid #e0e0e0;
        padding: 8px;
        text-align: center;
      }
      .bg-tile {
        width: 100%;
        height: 120px;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"><rect width="200" height="120" fill="%23ffd700"/><circle cx="100" cy="60" r="40" fill="%23d4af37"/></svg>');
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <h1>Image Harvest e2e fixture page</h1>
    <p>This page contains several representative image scenarios.</p>

    <div class="grid">
      <!-- Scenario 1: standard <img> with PNG-style data URL (red square) -->
      <div>
        <img
          alt="red square"
          width="120"
          height="120"
          src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22120%22%20height%3D%22120%22%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20fill%3D%22%23e74c3c%22%2F%3E%3C%2Fsvg%3E"
        />
        <div>img tag (SVG data URL)</div>
      </div>

      <!-- Scenario 2: standard <img> with a JPEG-shaped data URL (blue square) -->
      <div>
        <img
          alt="blue square"
          width="120"
          height="120"
          src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22120%22%20height%3D%22120%22%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20fill%3D%22%233498db%22%2F%3E%3C%2Fsvg%3E"
        />
        <div>img tag (blue)</div>
      </div>

      <!-- Scenario 3: CSS background-image -->
      <div>
        <div class="bg-tile" role="img" aria-label="gold background"></div>
        <div>CSS background-image</div>
      </div>

      <!-- Scenario 4: inline SVG element -->
      <div>
        <svg width="120" height="120" viewBox="0 0 120 120">
          <rect width="120" height="120" fill="#27ae60" />
          <text x="60" y="65" text-anchor="middle" fill="#fff" font-size="14">SVG</text>
        </svg>
        <div>inline SVG</div>
      </div>

      <!-- Scenario 5: another <img> to ensure count > 1 reliably -->
      <div>
        <img
          alt="purple square"
          width="120"
          height="120"
          src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22120%22%20height%3D%22120%22%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20fill%3D%22%239b59b6%22%2F%3E%3C%2Fsvg%3E"
        />
        <div>img tag (purple)</div>
      </div>
    </div>
  </body>
</html>
